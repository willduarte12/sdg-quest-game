<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDG 1 — No Poverty | Quiz</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-50: #E1F5EE;
    --green-100: #9FE1CB;
    --green-600: #0F6E56;
    --green-800: #085041;
    --red-50: #FCEBEB;
    --red-100: #F7C1C1;
    --red-600: #A32D2D;
    --bg: #ffffff;
    --bg-secondary: #f5f5f3;
    --text: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-tertiary: #888780;
    --border: rgba(0,0,0,0.12);
    --border-hover: rgba(0,0,0,0.28);
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --green-50: #085041;
      --green-100: #0F6E56;
      --green-600: #5DCAA5;
      --green-800: #9FE1CB;
      --red-50: #501313;
      --red-100: #791F1F;
      --red-600: #F09595;
      --bg: #1c1c1a;
      --bg-secondary: #262624;
      --text: #f0efe8;
      --text-secondary: #b4b2a9;
      --text-tertiary: #888780;
      --border: rgba(255,255,255,0.12);
      --border-hover: rgba(255,255,255,0.28);
    }
  }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    line-height: 1.7;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 2rem 1rem;
    min-height: 100vh;
  }

  .wrap {
    width: 100%;
    max-width: 600px;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 1.5rem;
  }

  .sdg-badge {
    width: 52px;
    height: 52px;
    border-radius: var(--radius-md);
    background: var(--green-50);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border: 0.5px solid var(--green-100);
  }

  .sdg-badge span {
    font-size: 11px;
    font-weight: 600;
    color: var(--green-600);
    text-align: center;
    line-height: 1.3;
  }

  .header-text h1 {
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
  }

  .header-text p {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .score-bar {
    display: flex;
    gap: 20px;
    margin-bottom: 1rem;
    padding: 10px 14px;
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
  }

  .score-item {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .score-item span {
    font-weight: 500;
    color: var(--text);
  }

  .card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 12px;
    min-height: 240px;
  }

  .tag {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--green-50);
    color: var(--green-600);
    display: inline-block;
    margin-bottom: 1rem;
    border: 0.5px solid var(--green-100);
  }

  .question {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 1.25rem;
  }

  .opts {
    display: grid;
    gap: 8px;
  }

  .opt {
    border: 0.5px solid var(--border-hover);
    border-radius: var(--radius-md);
    padding: 11px 14px;
    font-size: 14px;
    cursor: pointer;
    background: var(--bg);
    color: var(--text);
    text-align: left;
    transition: background .12s, border-color .12s;
    width: 100%;
    font-family: inherit;
    line-height: 1.5;
  }

  .opt:hover:not(:disabled) {
    background: var(--bg-secondary);
  }

  .opt.correct {
    background: var(--green-50);
    border-color: var(--green-100);
    color: var(--green-800);
  }

  .opt.wrong {
    background: var(--red-50);
    border-color: var(--red-100);
    color: var(--red-600);
  }

  .opt:disabled {
    cursor: default;
  }

  .feedback {
    margin-top: 1rem;
    padding: 12px 14px;
    border-radius: var(--radius-md);
    font-size: 14px;
    line-height: 1.6;
    display: none;
  }

  .feedback.show { display: block; }

  .feedback.correct {
    background: var(--green-50);
    color: var(--green-800);
    border: 0.5px solid var(--green-100);
  }

  .feedback.wrong {
    background: var(--red-50);
    color: var(--red-600);
    border: 0.5px solid var(--red-100);
  }

  .start-screen {
    text-align: center;
    padding: 2.5rem 1rem;
  }

  .start-screen p {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 1.5rem;
    line-height: 1.6;
  }

  .loading {
    display: none;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: var(--text-secondary);
    padding: 2.5rem 0;
    justify-content: center;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-tertiary);
    animation: pulse 1.2s infinite;
  }

  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }

  @keyframes pulse {
    0%, 100% { opacity: .3; }
    50% { opacity: 1; }
  }

  .actions {
    display: none;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-hover);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    transition: background .12s;
  }

  .btn:hover { background: var(--bg-secondary); }
  .btn:active { transform: scale(0.98); }

  .btn-primary {
    background: var(--green-50);
    border-color: var(--green-100);
    color: var(--green-600);
  }

  .btn-primary:hover { background: var(--green-100); }

  .hint {
    font-size: 12px;
    color: var(--text-tertiary);
  }

  .error {
    font-size: 14px;
    color: var(--red-600);
    padding: 1rem 0;
    text-align: center;
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="header">
    <div class="sdg-badge"><span>SDG<br>1</span></div>
    <div class="header-text">
      <h1>No Poverty</h1>
      <p>End poverty in all its forms everywhere</p>
    </div>
  </div>

  <div class="score-bar">
    <div class="score-item">Correct: <span id="correct">0</span></div>
    <div class="score-item">Wrong: <span id="wrong">0</span></div>
    <div class="score-item">Questions: <span id="total">0</span></div>
  </div>

  <div class="card" id="card">
    <div class="loading" id="loading">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <span>Generating question...</span>
    </div>
    <div id="quiz-area">
      <div class="start-screen">
        <p>Click the button below to generate your first question about SDG 1 — No Poverty.<br>Each question is unique and AI-generated.</p>
        <button class="btn btn-primary" onclick="generateQuestion()">
          <i class="ti ti-player-play" aria-hidden="true"></i>
          Start quiz
        </button>
      </div>
    </div>
  </div>

  <div class="actions" id="actions">
    <button class="btn btn-primary" onclick="generateQuestion()" id="next-btn">
      <i class="ti ti-refresh" aria-hidden="true"></i>
      New question
    </button>
    <span class="hint">Each question is AI-generated and unique</span>
  </div>

</div>

<script>
  var score = { correct: 0, wrong: 0, total: 0 };
  var answered = false;
  var currentData = null;
  var isLoading = false;

  function generateQuestion() {
    if (isLoading) return;
    isLoading = true;
    answered = false;
    currentData = null;

    document.getElementById("actions").style.display = "none";
    document.getElementById("quiz-area").innerHTML = "";
    document.getElementById("loading").style.display = "flex";

    var prompt = "You are generating a multiple choice quiz question about SDG 1 — No Poverty — for pre-intermediate English language learners (teenagers or young adults).\n\nRules:\n- The question must be about SDG 1 content: poverty, extreme poverty, inequality, access to basic resources, social protection, the 2030 Agenda\n- Language must be simple and clear (pre-intermediate level) — avoid complex vocabulary\n- Provide exactly 4 options labeled A), B), C), D)\n- Only one option is correct\n- The other three options must be plausible but clearly wrong\n- Include a short explanation (1-2 sentences) of why the correct answer is right, in simple English\n- Vary the question style each time: sometimes ask about definitions, sometimes about facts, sometimes about real-world examples or situations related to poverty\n- Do not repeat the same question\n\nRespond ONLY with a valid JSON object. No markdown, no code fences, no extra text before or after:\n{\"question\": \"...\", \"options\": [\"A) ...\", \"B) ...\", \"C) ...\", \"D) ...\"], \"correct\": 0, \"explanation\": \"...\"}\n\nThe correct field must be the 0-based index of the correct option (0, 1, 2, or 3).";

    fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      var text = data.content
        .map(function(b) { return b.text || ""; })
        .join("")
        .replace(/```json|```/g, "")
        .trim();
      currentData = JSON.parse(text);
      renderQuestion(currentData);
    })
    .catch(function() {
      document.getElementById("loading").style.display = "none";
      document.getElementById("quiz-area").innerHTML = "<p class=\"error\"><i class=\"ti ti-alert-circle\" aria-hidden=\"true\" style=\"vertical-align:-2px;margin-right:6px\"></i>Could not load question. Please check your connection and try again.</p>";
      document.getElementById("actions").style.display = "flex";
      isLoading = false;
    });
  }

  function renderQuestion(d) {
    document.getElementById("loading").style.display = "none";
    score.total++;
    document.getElementById("total").textContent = score.total;
    isLoading = false;

    var optsHtml = d.options.map(function(o, i) {
      return "<button class=\"opt\" onclick=\"checkAnswer(" + i + ")\">" + o + "</button>";
    }).join("");

    document.getElementById("quiz-area").innerHTML =
      "<span class=\"tag\"><i class=\"ti ti-help-circle\" aria-hidden=\"true\" style=\"font-size:12px;vertical-align:-1px;margin-right:4px\"></i>Multiple choice</span>" +
      "<div class=\"question\">" + d.question + "</div>" +
      "<div class=\"opts\" id=\"opts\">" + optsHtml + "</div>" +
      "<div class=\"feedback\" id=\"feedback\"></div>";

    document.getElementById("actions").style.display = "flex";
  }

  function checkAnswer(i) {
    if (answered || !currentData) return;
    answered = true;

    var d = currentData;
    var btns = document.querySelectorAll(".opt");
    btns.forEach(function(b, idx) {
      b.disabled = true;
      if (idx === d.correct) b.classList.add("correct");
      else if (idx === i && i !== d.correct) b.classList.add("wrong");
    });

    var fb = document.getElementById("feedback");
    if (i === d.correct) {
      score.correct++;
      document.getElementById("correct").textContent = score.correct;
      fb.className = "feedback correct show";
      fb.innerHTML = "<i class=\"ti ti-check\" aria-hidden=\"true\" style=\"font-size:14px;vertical-align:-2px;margin-right:6px\"></i><strong>Correct!</strong> " + d.explanation;
    } else {
      score.wrong++;
      document.getElementById("wrong").textContent = score.wrong;
      fb.className = "feedback wrong show";
      fb.innerHTML = "<i class=\"ti ti-x\" aria-hidden=\"true\" style=\"font-size:14px;vertical-align:-2px;margin-right:6px\"></i><strong>Not quite.</strong> " + d.explanation;
    }
  }
</script>
</body>
</html>
